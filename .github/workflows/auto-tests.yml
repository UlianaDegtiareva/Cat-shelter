name: API Tests (Ros Kot Monitoring)

on:
  push:
    branches: ["main", "dev", "task-*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: shelter
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install Node dependencies
        run: npm install

      - name: Start Student Solution
        run: ./start.sh &
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5433
          ROSKOT_API_URL: http://localhost:3000/external-api/roskot
          ROSKOT_API_KEY: super-secret-token-777

      - name: Wait for Backend to be ready
        run: |
          npx wait-on http://localhost:3000/api -t 60000
          sleep 5

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-dotenv
          pip install -r requirements.txt

      - name: Run Pytest
        run: timeout 3m pytest -v --base-url=http://localhost:3000 --alluredir=allure-results

      - name: Install Allure CLI
        if: always()
        run: |
          sudo apt update
          sudo apt install -y openjdk-17-jdk wget unzip
          wget https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.zip
          unzip allure-2.27.0.zip -d $HOME/.allure
          echo "$HOME/.allure/allure-2.27.0/bin" >> $GITHUB_PATH

      - name: Generate Allure HTML report
        if: always()
        run: |
          allure generate allure-results --clean -o allure-report

      - name: Deploy Allure HTML Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          force_orphan: true