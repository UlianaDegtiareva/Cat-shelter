name: API Tests

on:
  push:
    branches: ["main", "dev", "task-*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: shelter
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js (for wait-on utility)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Student Solution
        run: |
          chmod +x ./start.sh
          ./start.sh &
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5433
          PORT: 3000

      - name: Wait for Server
        run: npx wait-on tcp:localhost:3000 -t 60000

      - name: Set up Python for Tests
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pytest & Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-base-url requests python-dotenv allure-pytest

      - name: Run Pytest
        run: |
          pytest -v \
            --base-url=http://localhost:3000 \
            --alluredir=allure-results

      - name: Install Allure CLI
        if: always()
        run: |
          sudo apt update
          sudo apt install -y openjdk-17-jdk wget unzip
          wget https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.zip
          unzip allure-2.27.0.zip -d $HOME/.allure
          echo "$HOME/.allure/allure-2.27.0/bin" >> $GITHUB_PATH

      - name: Generate and Deploy Report
        if: always()
        run: |
          allure generate allure-results --clean -o allure-report
        
      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages