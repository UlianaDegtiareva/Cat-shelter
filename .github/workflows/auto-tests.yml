name: API Tests

on:
  push:
    branches: 
      - "main"
      - "dev"
      - "task-*"
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: shelter
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install Node dependencies
        run: npm install

      - name: Start NestJS Backend
        run: npm run start &
        env:
          ROSKOT_API_URL: "http://localhost:3000/external-api/roskot"
          ROSKOT_API_KEY: "super-secret-token-777"

      - name: Wait for Backend to be ready
        run: |
          # Ждем именно старта сервера
          npx wait-on http://localhost:3000/external-api/roskot -t 60000 
          sleep 5

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest
        run: |
          pytest -v \
            --base-url=http://localhost:3000 \
            --alluredir=allure-results

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results