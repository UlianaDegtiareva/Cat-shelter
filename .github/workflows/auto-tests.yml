name: API Tests

on:
  push:
    branches: ["main", "dev", "task-*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start all services via Docker Compose
        run: docker compose up -d --build

      - name: Wait for services
        run: |
          npx wait-on http://localhost:3000/api http://localhost:8080/cats -t 180000
          sleep 10

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -v --base-url=http://localhost:3000 --alluredir=allure-results

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results

      - name: Stop containers
        if: always()
        run: docker compose down -v