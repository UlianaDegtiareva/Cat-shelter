name: API Tests

on:
  push:
    branches: ["main", "dev", "task-*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: shelter
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23'

      - name: Start Go Service
        run: |
          cd cat-reader
          go build -o reader main.go
          ./reader &
        env:
          DB_HOST: localhost
          DB_PORT: 5433

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install & Start NestJS
        run: |
          npm install
          npm run start &
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5433
          READER_SERVICE_URL: http://localhost:8080 

      - name: Wait for Services
        run: |
          npx wait-on http://localhost:8080 http://localhost:3000/api -t 90000
          sleep 5

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Run Pytest
        run: |
          pip install -r requirements.txt
          pytest -v --base-url=http://localhost:3000 --alluredir=allure-results

      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results