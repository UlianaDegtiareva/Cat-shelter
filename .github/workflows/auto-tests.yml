name: API Tests

on:
  push:
    branches: ["main", "dev", "task-*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 12     # чуть больше, чтобы был запас

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: shelter
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ─── Go ────────────────────────────────────────────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: cat-reader/go.sum

      - name: Start Go Reader Service + wait
        run: |
          cd cat-reader
          go mod tidy
          go build -o main .
          nohup ./main > go-service.log 2>&1 &
          
          echo "Waiting for Go port 8080..."
          # Проверяем TCP порт, а не HTTP путь
          npx wait-on tcp:localhost:8080 --timeout 60000
          echo "Go service is up ✓"
        env:
          DB_HOST: localhost
          DB_PORT: 5433

      # ─── Node.js / NestJS ──────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install Node dependencies
        run: npm install

      - name: Start NestJS Backend + wait
        run: |
          nohup npm run start > nestjs.log 2>&1 &
          
          echo "Waiting for NestJS port 3000..."
          npx wait-on tcp:localhost:3000 --timeout 75000
          echo "NestJS is ready ✓"
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5433
          GO_SERVICE_URL: http://localhost:8080

      # ─── Финальное ожидание и тесты ────────────────────────
      - name: Final wait & extra safety sleep
        run: |
          echo "Double-checking both services..."
          curl -s http://localhost:3000/api || echo "API still not responding"
          curl -s http://localhost:8080/cats || echo "Go reader still not responding"
          sleep 4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest
        run: |
          pytest -v \
            --base-url=http://localhost:3000 \
            --alluredir=allure-results

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results